name: Events Demo 1
on: 
  pull_request:
    types:
      - opened
  workflow_dispatch:
  push:
    branches:
      - main # This will trigger the workflow for the main branch
      - "dev-*" # This will trigger the workflow for any branch that starts with "dev-"
      - "feature/*" # This will trigger the workflow for any branch that starts with "feature/*"
      - "feat/**" # This will trigger the workflow for any branch that starts with "feat/**"
    paths-ignore:
      - ".github/workflows/*"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
      - name: Deploy project
        run: echo "Deploying..."